server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # m3u8 extraction — same-origin, proxied to the extractor service.
  # Extraction can take a few seconds, so allow a generous read timeout.
  location /extract {
    proxy_pass http://grab:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 60s;
  }

  # SPA fallback — client-side routing (?view=/?match=) served by index.html
  location / {
    try_files $uri /index.html;
  }
}
