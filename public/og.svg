<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1310"/>
      <stop offset="1" stop-color="#070B09"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- pitch motif: halfway line + centre circle -->
  <g stroke="#2A332E" stroke-width="2" fill="none" opacity="0.55">
    <line x1="600" y1="40" x2="600" y2="590"/>
    <circle cx="600" cy="315" r="118"/>
    <circle cx="600" cy="315" r="5" fill="#2A332E" stroke="none"/>
  </g>

  <!-- corner ticks (brand signature) -->
  <g stroke="#2BD96B" stroke-width="4" opacity="0.75" stroke-linecap="square" fill="none">
    <path d="M60 60 h36 M60 60 v36"/>
    <path d="M1140 570 h-36 M1140 570 v-36"/>
  </g>

  <g font-family="'Helvetica Neue', Arial, sans-serif">
    <text x="80" y="252" fill="#2BD96B" font-size="30" font-weight="700" letter-spacing="11">WORLD CUP 2026</text>
    <text x="74" y="378" fill="#EAF2EC" font-size="148" font-weight="800" letter-spacing="4">STREAMCUP</text>
    <text x="80" y="448" fill="#9AA6A0" font-size="33" font-weight="500" letter-spacing="1.5">Live streams &amp; full fixtures, all in one place</text>
    <text x="80" y="560" fill="#5C6660" font-size="26" font-weight="600" letter-spacing="3">cup.umuo.app</text>
  </g>

  <g transform="translate(978,66)">
    <rect width="162" height="54" rx="11" fill="#0A0F0D" stroke="#FF4438" stroke-opacity="0.55"/>
    <circle cx="32" cy="27" r="8" fill="#FF4438"/>
    <text x="54" y="36" fill="#FF4438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4">LIVE</text>
  </g>
</svg>
