# One-shot deploy: `docker compose up -d --build`
# - web:       nginx serving the built SPA + reverse-proxying /extract
# - extractor: headless-Chromium m3u8 extractor (internal only, not exposed)
# Put your TLS / Cloudflare in front of the web service's published port.
services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - grab
    restart: unless-stopped

  grab:
    build: ./grab
    environment:
      - PORT=8081
    expose:
      - "8081"
    restart: unless-stopped
